<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Pocket Dev Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/721/721607.png">
</head>
    
<body>
    <h1>Pocket Dev Studio</h1>
    <textarea id="editor" placeholder="Napiš JavaScript kód sem..."></textarea>
    <button onclick="spustitKod()">Spustit kód</button>
    <h3>Výstup:</h3>
    <div id="output"></div>

    <script>
        function spustitKod() {
            const kod = document.getElementById('editor').value;
            const output = document.getElementById('output');
            try {
                // Přesměrujeme logování do našeho okna
                console.log = (msg) => output.innerHTML += msg + "<br>";
                const vysledek = eval(kod);
                output.innerHTML = "Výsledek: " + vysledek;
            } catch (err) {
                output.innerHTML = "Chyba: " + err.message;
            }
        }
    </script>
</body>
</html>
